<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">

  {% include head.html %}

  <body>
    
    {% include header.html %}

    {% if page.hero_title %}
    <div class="hero-banner" style="background-image: linear-gradient(rgba(17, 24, 39, 0.6), rgba(17, 24, 39, 0.6)), url('{{ "/images/blue-network-banner.jpg" | relative_url }}');">
      <div class="hero-content">
        <h1 class="hero-title">{{ page.hero_title }}</h1>
        <p class="hero-subtitle">{{ page.hero_subtitle }}</p>
      </div>
    </div>
    {% endif %}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

  </body>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Get the navigation container and the menu icon
    const siteNav = document.getElementById("site-nav");
    const menuIcon = siteNav.querySelector(".menu-icon");

    // Toggle the 'menu-open' class when the icon is clicked
    menuIcon.addEventListener("click", function(event) {
      siteNav.classList.toggle("menu-open");
      event.stopPropagation(); // Prevents click from bubbling to document
    });

    // Optional but highly recommended: Close menu if user clicks elsewhere on the page
    document.addEventListener("click", function(event) {
      if (!siteNav.contains(event.target)) {
        siteNav.classList.remove("menu-open");
      }
    });
  });
</script>
</html>
