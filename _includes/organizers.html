<div class="people-grid-container">
  {% for person in site.data.organizers %}
    <div class="person">
      <div class="circle-crop-wrapper">
        <img src="{{ person.image | relative_url }}" alt="{{ person.name }}"
          {% if person.position %}
            style="object-position: {{ person.position }};"
          {% endif %}>
      </div>
      <h3>
        {% if person.link %}
          <a href="{{ person.link }}" target="_blank" rel="noopener noreferrer">{{ person.name }}</a>
        {% else %}
          {{ person.name }}
        {% endif %}
      </h3>
      <p>{{ person.role }}</p>
      <p>{{ person.affiliation }}</p>
    </div>
  {% endfor %}
</div>
<div class="person">
  <p>*Equal contribution</p>
</div>
